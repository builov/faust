services:
  # PHP-FPM (собирается из Dockerfile для поддержки PDO MySQL)
  php:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: php81_app
    volumes:
      - ./:/var/www/html
    networks:
      - app_network

  # Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_network

  # MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: my_database
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_app
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db  # Указываем имя сервиса базы данных
      - PMA_ARBITRARY=1
    depends_on:
      - db
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
